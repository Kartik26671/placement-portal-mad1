{% extends "base.html" %}

{% block title %}Edit Drive{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8">

        <div class="card p-5">

            <h3 class="mb-4 fw-bold">Edit Placement Drive</h3>

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Job Title</label>
                    <input type="text"
                           name="title"
                           value="{{ drive.title }}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description"
                              class="form-control"
                              rows="4"
                              required>{{ drive.description }}</textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Eligibility</label>
                    <input type="text"
                           name="eligibility"
                           value="{{ drive.eligibility }}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Application Deadline</label>
                    <input type="date"
                           name="deadline"
                           value="{{ drive.deadline }}"
                           class="form-control"
                           required>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="/company_dashboard" class="btn btn-outline-secondary">
                        Cancel
                    </a>
                    <button type="submit" class="btn btn-warning">
                        Update Drive
                    </button>
                </div>

            </form>

        </div>

    </div>
</div>

{% endblock %}
